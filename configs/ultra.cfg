// =====================================================
// Portal 2 ULTRA HD v3 — Source Engine Maximum
// =====================================================


// ---------- TEXTURES ----------
mat_picmip -1
mat_forceaniso 16
mat_trilinear 1
mat_bumpmap 1
mat_parallaxmap 1
mat_filtertextures 1


// ---------- HDR & LIGHTING ----------
mat_hdr_level 2
mat_phong 1
mat_specular 1
r_worldlights 2
r_worldlightmin 0
r_worldlightmax 4
mat_filterlightmaps 1


// ---------- SHADOWS ----------
r_shadows 1
r_shadowrendertotexture 1
r_shadowmaxrendered 32
r_flashlightdepthtexture 1


// ---------- WATER & REFLECTIONS ----------
mat_envmapsize 1024
mat_envmaptgasize 1024
r_waterforceexpensive 1
r_waterforcereflectentities 1


// ---------- PORTAL RENDERING ----------
r_portal_use_dlights 1
r_portal_fastpath 0
r_portal_stencil_depth 1
r_portalrecurse 2


// ---------- MODEL & GEOMETRY DETAIL ----------
r_rootlod 0
r_lod 0
r_staticprop_lod -1
r_propsmaxdist 2000
lod_transitiondist 2000
cl_detaildist 1200
cl_detailfade 800


// ---------- PERFORMANCE / CPU (STABLE LINUX RELEASE) ----------
mat_queue_mode -1
mat_queue_priority 1
mat_reducefillrate 0
mat_disable_fancy_blending 0


// ---------- FRAME CONTROL ----------
mat_vsync 0
fps_max 0


// ---------- DEBUG CONFIRM ----------
echo "Portal 2 Ultra HD ENABLED"
